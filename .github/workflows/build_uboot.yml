name: Build H3C NX30 Pro U-Boot
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          repository: hhhnb/bl-mt798x
          ref: master

      - name: 安装完整编译依赖
        run: |
          sudo apt update && sudo apt install -y \
            gcc-aarch64-linux-gnu build-essential flex bison libssl-dev \
            device-tree-compiler qemu-user-static git wget unzip python3-pip \
            libncurses5-dev libncursesw5-dev pkg-config libz-dev
          # 修复 python 命令别名（脚本可能调用 python 而非 python3）
          sudo ln -s /usr/bin/python3 /usr/bin/python || true

      - name: 编译固件（强制指定输出路径）
        run: |
          chmod +x build.sh
          # 编译时手动指定输出目录为 output/，避免路径混乱
          SOC=mt7981 BOARD=h3c_magic-nx30-pro MULTI_LAYOUT=1 ./build.sh
      

